appId: com.popjot.app
productName: PopJot
copyright: Copyright © 2026 PopJot

directories:
  output: release

files:
  - out/**/*
  - "!node_modules/**/*"

extraResources:
  - from: assets/tray-icon.png
    to: tray-icon.png
  - from: assets/tray-icon@2x.png
    to: tray-icon@2x.png
  - from: assets/tray-icon-active.png
    to: tray-icon-active.png
  - from: assets/tray-icon-active@2x.png
    to: tray-icon-active@2x.png
  - from: assets/icon.png
    to: icon.png

asar: true

# ─── Windows ────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.png

nsis:
  oneClick: true
  perMachine: false
  # Installer/uninstaller icons fall back to the app icon (generated from the
  # 256px win.icon PNG). NSIS can't load a .png as installerIcon directly — add a
  # real assets/icon.ico and point installerIcon/uninstallerIcon at it for custom art.

# ─── macOS ──────────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: assets/icon.icns
  category: public.app-category.utilities
  # Allow the transparent overlay window to work on macOS
  extendInfo:
    NSHighResolutionCapable: true

dmg:
  sign: false

# ─── Linux ──────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: assets/icon.png
  category: Utility
