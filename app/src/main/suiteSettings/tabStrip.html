<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'" />
    <title>PopSuite Settings</title>
    <style>
      /* Self-contained tab strip. No framework, no external assets — it must not
         depend on either module's settings bundle. Dark chrome to match the
         settings window's #171717 background. */
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: #171717;
        font: 13px/1.2 system-ui, -apple-system, "Segoe UI", sans-serif;
        -webkit-user-select: none;
        user-select: none;
        overflow: hidden;
      }
      .tabs { display: flex; align-items: flex-end; height: 100%; padding: 6px 10px 0; gap: 4px; }
      .tab {
        appearance: none;
        border: 0;
        background: transparent;
        color: #8a8a8a;
        padding: 7px 16px;
        font: inherit;
        font-weight: 600;
        border-radius: 9px 9px 0 0;
        cursor: pointer;
        transition: background 120ms, color 120ms;
      }
      .tab:hover:not(.active) { color: #c9c9c9; background: #232323; }
      .tab.active { background: #262626; color: #f5f5f5; cursor: default; }
      /* A module whose process isn't connected: dimmed, but still selectable so
         the user can see its "not running" placeholder. */
      .tab.offline { color: #5a5a5a; }
      .tab.offline::after { content: " (off)"; font-weight: 400; font-size: 11px; }
      .tab:focus-visible { outline: 2px solid #4b8bf4; outline-offset: -2px; }
    </style>
  </head>
  <body>
    <div class="tabs" id="tabs" role="tablist" aria-label="Settings apps"></div>
    <script>
      // Vanilla renderer: build a button per module from the launcher's tab
      // state, highlight the active one, dim disconnected ones, and ask the
      // launcher to switch on click. Re-renders on every state change push.
      const root = document.getElementById("tabs");

      function render(state) {
        if (!state || !Array.isArray(state.tabs)) return;
        root.innerHTML = "";
        for (const tab of state.tabs) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.role = "tab";
          btn.className =
            "tab" +
            (tab.id === state.activeId ? " active" : "") +
            (tab.connected ? "" : " offline");
          btn.textContent = tab.label;
          btn.setAttribute("aria-selected", String(tab.id === state.activeId));
          btn.addEventListener("click", () => {
            if (tab.id !== state.activeId) window.suiteTabs.select(tab.id);
          });
          root.appendChild(btn);
        }
      }

      window.suiteTabs.onStateChanged(render);
      window.suiteTabs.getState().then(render);
    </script>
  </body>
</html>
