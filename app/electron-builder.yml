appId: com.popsuite.app
productName: PopSuite
copyright: Copyright © 2026 PopSuite

directories:
  output: release

# GitHub Releases as the update feed. electron-builder writes an app-update.yml
# into the packaged app (so electron-updater knows where to look) and, in publish
# mode (CI, GH_TOKEN present), creates/uploads the draft release with the NSIS
# installer + latest.yml update metadata. Local builds run with `--publish never`
# so they generate the installer + latest.yml on disk without any upload.
publish:
  provider: github
  owner: bradandersonjr
  repo: PopSuite
  releaseType: draft

files:
  - out/**/*
  # Production deps (uiohook-napi, the native global-input hook used by
  # PopKey's input capture and PopJot's Spotlight right-drag resize) are
  # auto-included by electron-builder's dependency tracing and unpacked via
  # asarUnpack below. We intentionally do NOT blanket-exclude node_modules —
  # that would strip the native binding and break both.

# Per-module resources, namespaced so createPopApp's resourceSubdir ("popjot" /
# "popkey") resolves the right tray/app icons at process.resourcesPath/<module>/.
extraResources:
  - from: modules/popjot/assets/tray-icon.png
    to: popjot/tray-icon.png
  - from: modules/popjot/assets/tray-icon@2x.png
    to: popjot/tray-icon@2x.png
  - from: modules/popjot/assets/tray-icon-active.png
    to: popjot/tray-icon-active.png
  - from: modules/popjot/assets/tray-icon-active@2x.png
    to: popjot/tray-icon-active@2x.png
  - from: modules/popjot/assets/icon.png
    to: popjot/icon.png
  - from: modules/popkey/assets/tray-icon.png
    to: popkey/tray-icon.png
  - from: modules/popkey/assets/tray-icon@2x.png
    to: popkey/tray-icon@2x.png
  - from: modules/popkey/assets/tray-icon-active.png
    to: popkey/tray-icon-active.png
  - from: modules/popkey/assets/tray-icon-active@2x.png
    to: popkey/tray-icon-active@2x.png
  - from: modules/popkey/assets/icon.png
    to: popkey/icon.png
  # Launcher's own unified tray icon (reuses PopJot's brand mark, which is also
  # the suite app icon). Resolved at process.resourcesPath/suite/tray-icon.png.
  - from: modules/popjot/assets/tray-icon.png
    to: suite/tray-icon.png
  - from: modules/popjot/assets/tray-icon@2x.png
    to: suite/tray-icon@2x.png

asar: true

# uiohook-napi ships a native .node binding that cannot run from inside the asar
# archive — unpack it so the PopKey and PopJot module processes can dlopen it
# at runtime.
asarUnpack:
  - "**/node_modules/uiohook-napi/**"

# ─── Windows (primary target) ───────────────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64]
  icon: modules/popjot/assets/icon.png

nsis:
  oneClick: true
  perMachine: false

# ─── macOS (mirror of the per-app configs) ──────────────────────────
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: modules/popjot/assets/icon-512.png
  category: public.app-category.utilities
  extendInfo:
    NSHighResolutionCapable: true

dmg:
  sign: false

# ─── Linux (mirror of the per-app configs) ──────────────────────────
linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: modules/popjot/assets/icon-512.png
  category: Utility
