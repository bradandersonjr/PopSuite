name: Release

# Cut a release by pushing a per-app tag, e.g. `popjot-v1.2.0` or `popkey-v1.0.3`.
# The matching app is built on Windows/macOS/Linux and its installers are
# attached to a GitHub Release named after the tag. Use the helper:
#   npm run release:popjot -- 1.2.0   (bumps version, commits, tags)
#   git push && git push origin popjot-v1.2.0
on:
  push:
    tags:
      - "popjot-v*"
      - "popkey-v*"

permissions:
  contents: write

jobs:
  # Resolve which app the tag refers to, once, for the build + release jobs.
  setup:
    runs-on: ubuntu-latest
    outputs:
      app_dir: ${{ steps.app.outputs.dir }}
      app_name: ${{ steps.app.outputs.name }}
      version: ${{ steps.app.outputs.version }}
    steps:
      - id: app
        run: |
          tag="${GITHUB_REF_NAME}"
          case "$tag" in
            popjot-v*) echo "dir=PopJot" >> "$GITHUB_OUTPUT"; echo "name=PopJot" >> "$GITHUB_OUTPUT" ;;
            popkey-v*) echo "dir=PopKey" >> "$GITHUB_OUTPUT"; echo "name=PopKey" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unrecognized release tag: $tag" >&2; exit 1 ;;
          esac
          echo "version=${tag#*-v}" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # PopKey's global input capture (uiohook-napi) is a native module; building
      # it on Linux needs the X11/xkb dev headers. Harmless to skip for PopJot.
      - name: Install Linux native-build deps (PopKey only)
        if: matrix.os == 'ubuntu-latest' && needs.setup.outputs.app_dir == 'PopKey'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxtst-dev libxt-dev libxinerama-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libxkbfile-dev libpng-dev

      - name: Install dependencies (hoisted workspace)
        run: npm ci

      - name: Build installers for ${{ needs.setup.outputs.app_name }}
        working-directory: ${{ needs.setup.outputs.app_dir }}
        env:
          # Build unsigned installers — no Apple/Windows code-signing certs yet.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.setup.outputs.app_name }}-${{ matrix.os }}
          path: |
            ${{ needs.setup.outputs.app_dir }}/release/*.exe
            ${{ needs.setup.outputs.app_dir }}/release/*.dmg
            ${{ needs.setup.outputs.app_dir }}/release/*.zip
            ${{ needs.setup.outputs.app_dir }}/release/*.AppImage
            ${{ needs.setup.outputs.app_dir }}/release/*.deb
            ${{ needs.setup.outputs.app_dir }}/release/*.yml
            ${{ needs.setup.outputs.app_dir }}/release/*.blockmap
          if-no-files-found: ignore
          retention-days: 5

  release:
    needs: [setup, build]
    runs-on: ubuntu-latest
    steps:
      - name: Collect installers from all platforms
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Create / update the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist-artifacts/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${{ needs.setup.outputs.app_name }} ${{ needs.setup.outputs.version }}" \
            --generate-notes \
          || gh release upload "${GITHUB_REF_NAME}" dist-artifacts/* \
            --repo "${GITHUB_REPOSITORY}" --clobber
